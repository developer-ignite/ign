name: Deploy to WPEngine

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build assets
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-theme
          path: .
          exclude: |
            node_modules
            .git

  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://ignitesustg.wpengine.com
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: built-theme

      - name: Deploy to WPEngine Staging
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: ignitesustg
          REMOTE_PATH: "wp-content/themes/ign/"
          FLAGS: -azvr --inplace --delete --exclude=.git --exclude=node_modules --exclude=.env
          CACHE_CLEAR: TRUE

  deploy-production:
    name: Deploy → Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://ignitestudentu.wpengine.com
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: built-theme

      - name: Deploy to WPEngine Production
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: ignitestudentu
          REMOTE_PATH: "wp-content/themes/ign/"
          FLAGS: -azvr --inplace --delete --exclude=.git --exclude=node_modules --exclude=.env
          CACHE_CLEAR: TRUE